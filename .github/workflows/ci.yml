name: CI

# Runs the swift-testing suite on every PR and on push to main. Registered as a
# required status check on the protected `main` ruleset so a red suite blocks
# merge (roadmap 0014). Mirrors release.yml's runner and hardening posture:
# macos-15 (Apple Silicon), newest stable Xcode (Swift toolchain >= 6.2 for the
# WhisperKit dependency), SHA-pinned actions, least-privilege permissions.

on:
  pull_request:
  push:
    branches:
      - main

# Least privilege: the job only reads the checked-out source — no writes,
# no packages, no release assets (0005 workflow hardening).
permissions:
  contents: read

# One in-flight run per ref; a new push supersedes the old one to save runner
# minutes. Never cancels a main-branch run mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: macos-15   # Apple Silicon (arm64); carries a Swift 6.x toolchain (deps need >= 6.2)

    steps:
      # Pinned to a full commit SHA per 0005 (workflow hardening).
      # NOTE: verify this SHA still maps to a trusted actions/checkout release
      # before the first real run.
      - name: Check out the PR/branch commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # The runner's default Xcode may ship an older Swift than the
      # dependencies require (they need tools >= 6.2). Select the newest
      # non-beta Xcode on the image so `swift build` matches a local build.
      # Same step release.yml performs.
      - name: Select the latest stable Xcode
        run: |
          set -euo pipefail
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)
          echo "Selecting $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          swift --version

      # Building WhisperKit from source is the expensive part, not the tests.
      # Cache the SwiftPM build/dependency tree keyed on the resolved pins so
      # steady-state runs skip the rebuild. Falls back to the newest partial
      # match when Package.resolved changes.
      # NOTE: verify this SHA still maps to a trusted actions/cache release
      # before the first real run.
      - name: Cache SwiftPM build products
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: swift build

      - name: Test
        run: swift test
